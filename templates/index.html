<!DOCTYPE html>

<html>
<head>
    <title>Iris Flower Prediction</title>

```
<style>
    body {
        font-family: Arial;
        background: #f4f6f9;
        text-align: center;
        padding: 40px;
    }

    .container{
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 400px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    input{
        width: 90%;
        padding: 8px;
        margin: 8px;
    }

    button{
        padding: 10px 20px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover{
        background: #45a049;
    }

    .result{
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
        color: #333;

```

</head>

<body>

<div class="container">

<h2>Iris Flower Prediction</h2>

<form method="POST">

<input type="text" name="sepal_length" placeholder="Sepal Length" required>

<input type="text" name="sepal_width" placeholder="Sepal Width" required>

<input type="text" name="petal_length" placeholder="Petal Length" required>

<input type="text" name="petal_width" placeholder="Petal Width" required>

<br>

<button type="submit">Predict</button>

</form>

{% if prediction %}

<div class="result">

Prediction: {{ prediction }}

</div>

{% endif %}

</div>

</body>
</html>
